# please god let me delete this fucking species

- type: species
  id: IPC
  name: species-name-ipc
  roundStart: true
  prototype: MobIPC
  sprites: MobIPCSprites
  markingLimits: MobHumanMarkingLimits #MobIPCMarkingLimits WF
  dollPrototype: MobIPCDummy
  skinColoration: Hues
  minAge: 1
  maxAge: 240
  oldAge: 50
  youngAge: 50
  maleFirstNames: IpcFirst
  femaleFirstNames: IpcFirst
  lastNames: IpcLast
  naming: FirstDashLast
  sexes:
  - Unsexed

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: MobIPCSprites
  sprites:
    Special: MobHumanoidAnyMarking
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    Head: MobIPCHead
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Hair: MobHumanoidMarkingMatchSkin
    Chest: MobIPCTorso
    LArm: MobIPCLArm
    RArm: MobIPCRArm
    LHand: MobIPCLHand
    RHand: MobIPCRHand
    LLeg: MobIPCLLeg
    RLeg: MobIPCRLeg
    LFoot: MobIPCLFoot
    RFoot: MobIPCRFoot
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    RArmExtension: MobHumanoidAnyMarking # Adds Wing Slot

- type: markingPoints
  id: MobIPCMarkingLimits
  points:
    Special:
      points: 32 # WF
      required: false
    Head:
      points: 32
      required: true
      defaultMarkings: [ MobIPCHeadDefault ]
    Chest:
      points: 32
      required: true
      defaultMarkings: [ MobIPCTorsoDefault ]
    Legs:
      points: 32
      required: true
      defaultMarkings: [ MobIPCLLegDefault, MobIPCLFootDefault, MobIPCRLegDefault, MobIPCRFootDefault ]
    Arms:
      points: 32
      required: true
      defaultMarkings: [ MobIPCLArmDefault, MobIPCLHandDefault, MobIPCRArmDefault, MobIPCRHandDefault ]
    HeadSide:
      points: 32
      required: false
    HeadTop:
      points: 32 # WF
      required: false
    Snout:
      points: 32 # WF
      required: false
    Hair:
      points: 32 # WF
      required: false
    FacialHair:
      points: 32 # WF
      required: false
    Tail:
      points: 32 # WF
      required: false
    UndergarmentTop:
      points: 32 # WF
      required: false
    UndergarmentBottom:
      points: 32 # WF
      required: false
    Genital:
      points: 32 # WF
      required: false
    Overlay:
      points: 32 # WF
      required: false

- type: humanoidBaseSprite
  id: MobIPCMarkingFollowSkin
  markingsMatchSkin: true
  layerAlpha: 0.5

- type: humanoidBaseSprite
  id: MobIPCScreen

