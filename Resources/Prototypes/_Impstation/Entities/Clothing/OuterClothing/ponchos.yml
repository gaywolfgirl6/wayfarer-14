- type: entity
  parent: [ClothingOuterBase, ClothingNeckBase]
  id: IMPClothingOuterRainCape
  name: rain cape
  description: Surplus gear made from durable canvas.
  components:
  - type: Sprite
    sprite: _Impstation/Clothing/OuterClothing/Misc/poncho.rsi
    layers:
    - state: GREEN-icon
  - type: Item
    inhandVisuals:
      left:
      - state: GREEN-inhand-left
      right:
      - state: GREEN-inhand-right
  - type: Clothing
    slots:
    - OUTERCLOTHING
    - NECK
    sprite: _Impstation/Clothing/OuterClothing/Misc/poncho.rsi
    clothingVisuals:
      neck:
      - state: GREEN-equipped-OUTERCLOTHING
      outerClothing:
      - state: GREEN-equipped-OUTERCLOTHING

