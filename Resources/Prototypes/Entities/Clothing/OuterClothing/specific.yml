- type: entity
  id: ClothingOuterChameleon
  parent: [ClothingOuterBase, BaseChameleon, ClothingArmorPlate ] # Coyote: Allows it to use armor plates.
  name: vest
  description: A thick vest with a rubbery, water-resistant shell.
  suffix: Chameleon
  components:
    - type: Tag
      tags: [] # ignore "WhitelistChameleon" tag
    - type: Sprite
      sprite: Clothing/OuterClothing/Vests/vest.rsi
    - type: Clothing
      sprite: Clothing/OuterClothing/Vests/vest.rsi
    - type: ChameleonClothing
      slot: [outerClothing]
      default: ClothingOuterVest
    - type: TemperatureProtection # Same as a basic winter coat.
      heatingCoefficient: 1.1
      coolingCoefficient: 0.1
    - type: Armor
      modifiers:
        coefficients:
          Slash: 0.95
          Heat: 0.90
      showArmorOnExamine: false
    # Coyote: These are required for the ability to both use its storage, and have the chameleon UI.
    - type: UserInterface
      interfaces:
        enum.StorageUiKey.Key:
          type: StorageBoundUserInterface
        enum.ChameleonUiKey.Key:
          type: ChameleonBoundUserInterface
    # Coyote End
