- type: entity
  parent: BaseComputer
  id: ComputerTechnologyDiskTerminal
  # categories: [ HideSpawnMenu ] # Frontier: no tech disks     ## Wayfarer turned back on
  name: tech disk terminal
  description: A terminal used to print out research point disks.
  components:
  - type: Sprite
    noRot: true
    sprite: Structures/Machines/tech_disk_printer.rsi
    layers:
    - map: ["computerLayerBody"]
      state: icon
    - map: ["computerLayerScreen"]
      state: unshaded
  - type: PointDiskConsole # Wayfarer: DiskConsole<PointDiskConsole (Monolith #1408)
  - type: ResearchClient
  - type: ActivatableUI
    key: enum.PointDiskConsoleUiKey.Key # Wayfarer: DiskConsoleUiKey<PointDiskConsoleUiKey (Monolith #1408)
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.PointDiskConsoleUiKey.Key: # Wayfarer: DiskConsoleUiKey<PointDiskConsoleUiKey (Monolith #1408)
        type: PointDiskConsoleBoundUserInterface # Wayfarer: DiskConsoleBoundUserInterface<PointDiskConsoleBoundUserInterface
      enum.ResearchClientUiKey.Key:
        type: ResearchClientBoundUserInterface
  - type: ExtensionCableReceiver
  - type: Computer
    board: TechDiskComputerCircuitboard
  - type: PointLight
    radius: 0.8
    energy: 0.5
    color: "#b53ca1"

- type: weightedRandom
  id: TechDiskTierWeights
  weights:
    1: 25
    2: 10
    3: 1

- type: weightedRandom
  id: RareTechDiskTierWeights
  weights:
    2: 19
    3: 1
