- type: entity
  name: civilian
  parent: BaseMobHuman
  id: MobCivilian
  description: A miserable pile of secrets.
  components:
  - type: InputMover
  - type: MobMover
  - type: Loadout
    prototypes: [LimitedPassengerGear]
  - type: NpcFactionMember
    factions:
    - NanoTrasen

- type: entity
  name: salvager
  parent: BaseMobHuman
  id: MobSalvager
  components:
    - type: NpcFactionMember
      factions:
        - Syndicate
    - type: Loadout
      prototypes:
        - SalvageSpecialistGear
    - type: InputMover
    - type: MobMover
  # // Wayfarer - Use new N14HostileCompound preset
    - type: HTN
      rootTask:
        task: N14HostileCompound # Wayfarer: SimpleHostileCompound<N14HostileCompound
      blackboard:
        NavClimb: !type:Bool
          true
        NavInteract: !type:Bool
          true
        NavPry: !type:Bool
          true
        NavSmash: !type:Bool
          false
        MeleeRange: !type:Single
          1.5
  # // Wayfarer

- type: entity
  name: spirate
  parent: BaseMobHuman
  id: MobSpirate
  description: Yarr!
  components:
  - type: NpcFactionMember
    factions:
      - Syndicate
  - type: Loadout
    prototypes:
      - PirateGear
  - type: InputMover
  - type: MobMover
  # // Wayfarer - Use new N14HostileCompound preset
  - type: HTN
    rootTask:
      task: N14HostileCompound # Wayfarer: SimpleHostileCompound:<N14HostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        false
      MeleeRange: !type:Single
        1.5
  # // Wayfarer

- type: entity
  name: syndicate footsoldier
  parent: BaseMobHuman
  id: MobSyndicateFootsoldier
  components:
    - type: NpcFactionMember
      factions:
        - Syndicate
    - type: Loadout
      prototypes:
        - SyndicateFootsoldierGearRuin
    - type: InputMover
    - type: MobMover
  # // Wayfarer - Use new N14HostileCompound preset
    - type: HTN
      rootTask:
        task: N14RangedHostileCompound # Wayfarer: SimpleHumanoidHostileCompound<N14RangedHostileCompound
      blackboard:
        #NavClimb: !type:Bool # Commented out because it made them trip over tables and it was really funny but they didn't stand up
        #true
        NavInteract: !type:Bool
          true
        NavPry: !type:Bool
          true
        NavSmash: !type:Bool
          true
        MeleeRange: !type:Single
          1.5
  # // Wayfarer

- type: entity
  name: syndicate shuttle pilot
  parent: MobSyndicateFootsoldier
  id: MobSyndicateFootsoldierPilot

- type: entity
  parent: BaseMobHuman
  suffix: Dead
  save: false # mobs are currently not saveable.
  id: SalvageHumanCorpse
  name: unidentified corpse
  description: I think they're dead.
  categories: [ HideSpawnMenu ] # Frontier
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: Damageable
    damage:
      types:
        Bloodloss: 49
        Asphyxiation: 76
        Slash: 56
        Blunt: 19
  - type: Inventory
    templateId: corpse

- type: entity
  parent: MobHuman
  id: MobCluwne
  name: person
  description: A polymorphed unfortunate.
  components:
  - type: Cluwne
  - type: Speech
    speechVerb: Cluwne
