#Socks and Things
#
#Bee
- type: entity
  parent: ClothingHandsBase
  id: ClothingHandsBeeWarmers
  name: bee arm-warmers
  description: A pair of rather nice arm-warmers.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Gloves/beewarmer.rsi
  - type: Clothing
    sprite: _HL/Clothing/Gloves/beewarmer.rsi
  - type: Fiber
    fiberMaterial: fibers-synthetic
    fiberColor: fibers-yellow
  - type: FingerprintMask
  - type: StaticPrice # Frontier: setting base price to make material arbitrage happier
    price: 80 # Frontier

- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformBeeThong
  name: bee thong
  description: Styled with a bee motif, but is this even considered a piece of clothing?
  components:
  - type: Sprite
    sprite: _HL/Clothing/Uniforms/beethong.rsi
  - type: Clothing
    sprite: _HL/Clothing/Uniforms/beethong.rsi
  - type: StaticPrice # Frontier: setting base price to make material arbitrage happier
    price: 80 # Frontier

