- type: job
  id: NFPirate
  name: job-name-nf-pirate
  description: job-description-nf-pirate
  playTimeTracker: JobPirate
  whitelisted: true
  startingGear: OutlawStartingGear
  requirements:
  - !type:DepartmentTimeRequirement
    department: Security # CGP
    time: 28800 # 8 hours
  alwaysUseSpawner: true
  hideConsoleVisibility: true
  canBeAntag: true
  icon: "JobIconOutlaw"
  supervisors: job-supervisors-nf-pirate
  weight: 20
  displayWeight: 20
  setPreference: true
  newPlayerMessage: false
  access:
  - Pirate
  accessGroups:
  - GeneralAccess
  special:
  - !type:AddComponentSpecial
    components:
    - type: AutoPirate
    - type: SpecialSectorStationRecord # must be given on spawn
      recordGeneration: FalseRecord
    - type: DisableSuitSensors
  - !type:AddImplantSpecial
    implants: [ FreelanceTrackingImplant ]
  - !type:GiveItemOnHolidaySpecial # Even pirates get a piece of cake.
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: chameleonOutfit
  id: NFPirateChameleonOutfit
  job: NFPirate

- type: startingGear
  id: OutlawStartingGear
  equipment:
    pocket1: BasePirateUplinkPirateCrew

- type: roleLoadout
  id: JobNFPirate
  groups:
  - WFJumpsuit
  - WFOuterClothing
  - WFBackpack
  - WFShoes
  - WFHead
  - NFPirateEars
  - WFGloves
  - WFOutlawPDA
  - WFGlasses
  - WFFace
  - WFBelt
  - WFNeck
  - OutlawEncryptionKey
  - WFBoxSurvival
  - WFWallet
  - WFCartridge
  - WFImplanter
  - PirateBackpackItems
  - WFHandItems
  - NFSpeciesSpecific
  - WFSidearm
  - WFLongarm
  - WFAmmo
  canCustomizeName: true # pseudonym?
