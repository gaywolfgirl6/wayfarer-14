- type: entity
  name: EM72 Ashstorm
  parent: BaseWeaponPowerCell
  id: WeaponLaserCellMG
  description: EM72 Ashstorm, The UTSP-EM72 Ashstorm is a directed-energy light machine gun developed by Telum Industries under UTSP weapons contract 934A. Designed for sustained suppressive fire in void or planetary combat.
  components:
  - type: Item
    size: Huge
    shape:
    - 0,0,4,3
  - type: Wieldable
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -16
  - type: Gun
    minAngle: 23
    maxAngle: 20
    fireRate: 8
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: Battery
    maxCharge: 2500
    startingCharge: 2500
  - type: HitscanBatteryAmmoProvider
    proto: WFAshstormLaser
    fireCost: 25
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 100
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Battery/cell_mg.rsi
    layers:
    - state: icon
      visible: false
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-4
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: SpeedModifiedOnWield
    walkModifier: 0.80
    sprintModifier: 0.80
  - type: PhysicalComposition
    materialComposition:
      Steel: 500
      Gold: 125
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Battery/cell_mg.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage

- type: hitscan
  id: WFAshstormLaser
  damage:
    types:
      Heat: 6
      Radiation: 6
  muzzleFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: muzzle_omni
  travelFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: beam_omni
  impactFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: impact_omni
  maxLength: 21
