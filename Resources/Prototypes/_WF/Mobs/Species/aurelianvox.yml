- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobAurelianVox
  abstract: true
  components:
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: _WF/Mobs/Species/AurelianVox/parts.rsi
    state: full
  - type: Body
    prototype: AurelianVox
    requiredLegs: 2
    #- type: VoxAccent # Not yet coded
  - type: Speech
    speechVerb: Vox
    speechSounds: Vox
    allowedEmotes: ['Click', 'Chitter', 'Hiss', 'Coo']
  - type: TypingIndicator
    proto: vox
  - type: Vocal
    sounds:
      Male: UnisexVox
      Female: UnisexVox
      Unsexed: UnisexVox
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 5
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Vox
  - type: PassiveDamage
    # Augment normal health regen to be able to tank some Poison damage
    # This allows Vox to take their mask off temporarily to eat something without needing a trip to medbay afterwards.
    allowedStates:
    - Alive
    damageCap: 20
    damage:
      types:
        Heat: -0.07
        Poison: -0.2
      groups:
        Brute: -0.07
  - type: PressureProtection
    highPressureMultiplier: 1
    lowPressureMultiplier: 1000
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.1
        Heat: 0.5
  - type: ThermalRegulator
    metabolismHeat: 800
    radiatedHeat: 100
    implicitHeatRegulation: 250
    sweatHeatRegulation: 1000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 288
    thermalRegulationTemperatureThreshold: 2
  - type: Temperature
    coldDamageThreshold: 1.0
    heatDamageThreshold: 308 # Very close to ambient temperature.
    currentTemperature: 288
    coldDamage:
      types:
        Cold : 0 #Just incase
    heatDamage:
      types:
        Heat : 3
  - type: TemperatureSpeed
    thresholds:
      85.53: 0.8
      45.87: 0.6
      1.0: 0.4
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Bloodstream
    bloodReagent: AmmoniaBlood
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 4
        Bloodloss: 4
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.42
        density: 300
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: ProtectedFromStepTriggers
  - type: Insulated
    coefficient: 0.5 # Still zappy, but no prone
  - type: MobThresholds # Durable, but dies sooner
    thresholds:
      0: Alive
      125: Critical
      175: Dead
  - type: Stamina
    critThreshold: 85
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.75 # 0.7 Base is 0.7
      80: 0.55 # 0.5 Base is 0.5
      100: 0.35
  - type: Sprite
    layers:
    - map: [ "enum.HumanoidVisualLayers.Chest" ]
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Snout" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.Genital" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - map: [ "jumpsuit" ]
    - map: [ "enum.HumanoidVisualLayers.LFoot" ]
    - map: [ "enum.HumanoidVisualLayers.RFoot" ]
    - map: [ "enum.HumanoidVisualLayers.LHand" ]
    - map: [ "enum.HumanoidVisualLayers.RHand" ]
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
    - map: [ "eyes" ]
    - map: [ "belt" ]
    - map: [ "id" ]
    - map: [ "back" ] # Not default to fix bags going over tail, going to have to find a better solution for this layering in the future.
    - map: [ "enum.HumanoidVisualLayers.TailBehind" ] # Should always be used for avox tails by default.
    - map: [ "outerClothing" ] # Must be here or tails will show over armors.
    - map: [ "neck" ]
    - map: [ "suitstorage" ] # This is not in the default order.
    - map: [ "enum.HumanoidVisualLayers.TailOversuit" ]
    - map: [ "enum.HumanoidVisualLayers.SnoutCover" ]
    - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
    - map: [ "mask" ] # Moved so hair is shown over back sprites for masks.
    - map: [ "enum.HumanoidVisualLayers.Hair" ]
    - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
    - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
    - map: [ "enum.HumanoidVisualLayers.Tail" ]
    - map: [ "head" ]
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
    - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
      color: "#ffffff"
      sprite: Objects/Misc/handcuffs.rsi
      state: body-overlay-2
      visible: false
    - map: [ "clownedon" ]
      sprite: "Effects/creampie.rsi"
      state: "creampie_vox" # Not default
      visible: false
  - type: HumanoidAppearance
    species: AurelianVox
    undergarmentTop: UndergarmentTopTanktopVox
    undergarmentBottom: UndergarmentBottomBoxersVox
    markingsDisplacement:
      Hair:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: hair
  - type: Inventory
    speciesId: avox
    #templateId: AurelianVox
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: jumpsuit
      eyes:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: hand
      head:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: head
      back:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: back
      ears:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: ears
      shoes:
        sizeMaps:
          32:
            sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
            state: shoes
  - type: Hands
    leftHandDisplacement:
      sizeMaps:
        32:
          sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
          state: hand_l
    rightHandDisplacement:
      sizeMaps:
        32:
          sprite: _WF/Mobs/Species/AurelianVox/displacement.rsi
          state: hand_r

