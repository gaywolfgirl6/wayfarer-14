# comment line change to what you want
- type: vessel
  id: MooringBuoy
  parent: BaseVessel
  name: CNS Mooring Buoy  # AAA is the industry name make your own I'm using BAM or Big Aim Machinery name work in progress...
  description: The Concordia National Shipyard's simple Mooring Buoy is meant for auxiliary docking around points of interest! Atmospherics not included.
  price: 7000 # (gridtc *50 + appraisegrid ) * 1.(15*roles)
  category: Small #Small Medium Large
  group: Sr #Shipyard, Security, Expedition, BlackMarket, Scrap
  shuttlePath: /Maps/_WF/Shuttles/Sr/mooringbuoy.yml
  guidebookPage: Null #can also use "Null" if you want to skip the guide book making
  class:
  - Civilian
  # - civilian
  engine:
  - Welding
  # - power type

- type: gameMap
  id: MooringBuoy
  mapName: 'CNS Mooring Buoy'
  mapPath: /Maps/_WF/Shuttles/Sr/mooringbuoy.yml
  minPlayers: 0
  stations:
    MooringBuoy:
      stationProto: StandardFrontierVessel
      components:
      - type: StationNameSetup
        mapNameTemplate: 'Mooring Buoy {1}'
        nameGenerator:
          !type:NanotrasenNameGenerator
          prefixCreator: '14'
      - type: StationJobs
        availableJobs: {}
