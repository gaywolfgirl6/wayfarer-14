# IPC/Synth
# These are technically duplicates of the original, but I had to decouple them from the SiliconEmotes blacklist... no better way of doing this at the moment, and emotes can't parent either. I hate it here.

- type: emote
  id: IPCChime
  name: chat-emote-name-chime
  category: Vocal
  icon: Interface/Emotes/chime.png
  whitelist:
    requireAll: true
    components:
    - Vocal
    tags:
    - IPCEmotes
  chatMessages: ["chat-emote-msg-chime"]
  chatTriggers:
  - chime
  - chimes
  - chimed
  - chiming

