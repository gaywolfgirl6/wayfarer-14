# Corp Station Save Blacklist
# Entities matching these prototypes or tags will be deleted from corporation
# player stations before the grid is saved at round end / autosave.
# Contributors: add entries to either list freely and keep entries grouped/commented.

- type: corpStationSaveBlacklist
  id: Default

  # ── Tags ──────────────────────────────────────────────────────────────────
  # Any entity that carries one of these tags is stripped before saving.
  tags:

  # Syndicate / high-risk items
  - Syndicate          # Uplinks, syndicate-branded gear
  - HighRiskItem       # Nuke disk, captain's ID, etc.
  - NukeOpsUplink

  # Firearms & ranged weapons
  - Cartridge          # All live ballistic rounds (broad catch-all)
  - CartridgePistol
  - CartridgeMagnum
  - CartridgeRifle
  - CartridgeLightRifle
  - CartridgeHeavyRifle
  - CartridgeCaselessRifle
  - CartridgeAntiMateriel
  - CartridgeRocket
  # NF ammo tags
  - NFCartridgePistol35
  - NFCartridgePistol45
  - NFCartridgeRifle10
  - NFCartridgeRifle20
  - NFCartridgeRifle25
  - NFCartridgeRifle30
  - NFCartridgeRifle60
  - NFCartridgeRocket

  # Magazines
  - MagazinePistol
  - MagazineMagnum
  - MagazineRifle
  - MagazineLightRifle
  - MagazineHeavyRifle
  - MagazineShotgun
  - MagazineCaselessRifle
  - MagazineGrenade
  # NF magazine tags
  - NFMagazinePistol35
  - NFMagazinePistol45
  - NFMagazineRifle20
  - NFMagazineRifle30
  - NFMagazineSubMachineGunPistol35
  - NFMagazineSubMachineGunPistol45

  # Shotgun shells
  - ShellShotgun

  # Grenades & explosives
  - Grenade
  - GrenadeFlashBang
  - HandGrenade
  - MacroBomb
  - MicroBomb
  - Payload             # Grenade/bomb crafting components

  # Implants (loose — not inside someone)
  - SubdermalImplant

  # Misc dangerous
  - Sidearm             # Holstered sidearm items (pistols/revolvers)
  - Taser               # Stun weapons

