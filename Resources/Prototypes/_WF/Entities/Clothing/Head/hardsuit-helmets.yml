#UTSP Combat Suit
- type: entity
  parent: NFClothingHeadHardsuitWithLightBase
  id: ClothingHeadUTSPHardsuit
  categories: [ HideSpawnMenu ]
  name: UTSP combat exosuit helmet
  description: Combat exosuit helmet for the UTSP, comes with integrated scanners and flash protection.
  components:
  - type: BreathMask
  - type: Sprite
    sprite: _Mono/Clothing/Head/Hardsuits/ertengineer.rsi
  - type: Clothing
    sprite: _Mono/Clothing/Head/Hardsuits/ertengineer.rsi
  - type: PointLight
    color: "#ffeead"
    radius: 7
    energy: 5
  - type: PressureProtection
    highPressureMultiplier: 0.525
    lowPressureMultiplier: 10000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.2
        Slash: 0.2
        Piercing: 0.2
        Heat: 0.2
        Radiation: 0.2
        Caustic: 0.2
  # HUD Components
  - type: ShowJobIcons # Wayfarer: Add ShowJobIcons
  - type: ShowHealthBars # Wayfarer: Add ShowHealthbars
    damageContainers:
    - Biological
    - Inorganic
    - Silicon
  - type: ShowMindShieldIcons
  - type: ShowCriminalRecordIcons
  - type: ShowContrabandDetails
  - type: FlashImmunity
  - type: EyeProtection
  # Integrated ASS Scanner
  - type: ActivatableUI
    key: enum.RadarConsoleUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.RadarConsoleUiKey.Key:
        type: RadarConsoleBoundUserInterface
  - type: RadarConsole
    followEntity: true
