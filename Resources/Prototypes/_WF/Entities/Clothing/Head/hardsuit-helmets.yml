#Outlaw Hardsuit
- type: entity
  parent: NFClothingHeadHardsuitWithLightBase
  id: ClothingHeadOutlawHardsuit
  categories: [ HideSpawnMenu ]
  name: outlaw hardsuit helmet
  description: Lightly armored hardsuit helmet for outlaws.
  components:
  - type: BreathMask
  - type: Sprite
    sprite: _Mono/Clothing/Head/Hardsuits/scaf_pirate.rsi
  - type: Clothing
    sprite: _Mono/Clothing/Head/Hardsuits/scaf_pirate.rsi
  - type: PointLight
    color: "#ffeead"
    radius: 6
    energy: 4
  - type: PressureProtection
    highPressureMultiplier: 0.525
    lowPressureMultiplier: 10000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9

#Outlaw Combat Hardsuit
- type: entity
