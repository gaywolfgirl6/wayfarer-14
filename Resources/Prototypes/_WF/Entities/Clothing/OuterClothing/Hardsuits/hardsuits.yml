# Outlaw Hardsuit
- type: entity
  parent: [ ClothingOuterHardsuitBaseNF, BaseBMContraband ]
  id: ClothingOuterOutlawHardsuit
  name: outlaw hardsuit
  description: A rugged, lightly armored combat hardsuit used by Outlaws.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/scaf_pirate.rsi
  - type: Clothing
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/scaf_pirate.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.60
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.70
        Heat: 0.75
        Radiation: 0.75
        Caustic: 0.75
  - type: ClothingSpeedModifier
    walkModifier: 1.0
    sprintModifier: 1.0
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadOutlawHardsuit

# Outlaw Tactical Hardsuit
- type: entity
  parent: [ ClothingOuterHardsuitBaseNF, BaseBMContraband ]
  id: ClothingOuterOutlawHardsuitCombat
  name: outlaw combat hardsuit
  description: A heavy combat hardsuit used by Outlaws. Provides superior ballistic protection, but lacks any specialized thermal shielding.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/ussp_combat.rsi
  - type: Clothing
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/ussp_combat.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.4
        Heat: 0.6
        Radiation: 0.6
        Caustic: 0.75
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.8
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadOutlawHardsuitCombat

# UTSP Combat Suit
- type: entity
  parent: [ ClothingOuterHardsuitBaseNF, BaseMilitaryContraband ]
  id: ClothingOuterUTSPHardsuit
  name: UTSP combat exosuit
  description: A high tech combat exosuit developed for the elite UTSP emergency response teams.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/ertengineer.rsi
  - type: Clothing
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/ertengineer.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.001
  - type: ExplosionResistance
    damageCoefficient: 0.2
  - type: FireProtection
    reduction: 0.9
  - type: StaminaResistance
    damageCoefficient: 0.10
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.1
        Slash: 0.1
        Piercing: 0.1
        Heat: 0.1
        Radiation: 0.1
        Caustic: 0.1
  - type: ClothingSpeedModifier
    walkModifier: 1.0
    sprintModifier: 1.2
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadUTSPHardsuit
