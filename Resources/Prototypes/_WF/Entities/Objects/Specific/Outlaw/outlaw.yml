# region Base Uplink
- type: entity
  parent: [ BaseItem, StorePresetOutlawUplink ]
  id: BasePirateUplink
  name: outlaw uplink
  abstract: true
  description: A scarred tablet encased in heat-resistant composite with slot for data chits on the side.
  suffix: Empty
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Mono/Objects/Devices/rogue_uplink.rsi
    layers:
    - state: icon
      scale: 0.7, 0.7
    - state: icon-overlay-green
      scale: 0.7, 0.7
      shader: unshaded
  - type: Item
    sprite: _Mono/Objects/Devices/rogue_uplink.rsi
    heldPrefix: icon
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Tag
    tags:
    - OutlawUplinkBase

