- type: entity
  parent: [BaseSecurityPDA, BaseCommandContraband]
  id: CommodorePDA
  name: commodore PDA
  description: With great power comes great responsibility.
  components:
  - type: Pda
    id: ShriffIDCard
    bookSlot:
      startingItem: HyperlinkBookNfsdSop
      priority: -2
      whitelist:
        tags:
        - BookSpaceLaw
        - BookNfsdSop
    penSlot:
      startingItem: PenCentcom
      priority: -1
      whitelist:
        tags:
        - Write
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-commodore
  - type: PdaBorderColor
    borderColor: "#23262A"
    accentHColor: "#ffa71a"
  - type: Icon
    state: pda-commodore
  - type: CartridgeLoader # Extended with the ledger
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NanoChatCartridge # Wayfarer
    - NewsReaderCartridge
    - BountyContractsCartridge
    - AstroNavCartridge
    - WantedListCartridge
    - LedgerCartridge

