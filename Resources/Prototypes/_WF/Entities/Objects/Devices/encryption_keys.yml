- type: entity
  parent: [EncryptionKey]
  id: EncryptionKeyHorny
  name: horny encryption key
  description: An encryption key for the Horny channel. For horny discussion.
  components:
  - type: EncryptionKey
    channels:
    - Horny
    defaultChannel: Horny
  - type: Item
    sprite: _WF/Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: _WF/Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_horny
    - state: horny_label

- type: entity
  parent: [EncryptionKey]
