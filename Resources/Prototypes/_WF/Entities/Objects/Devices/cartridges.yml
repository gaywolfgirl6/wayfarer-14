      sprite: Objects/Devices/cartridge.rsi
      state: cart-s
    - type: UIFragment
      ui: !type:OutlawBountyUi
    - type: Cartridge
      programName: outlaw-bounty-program-name
      icon: _NF/Interface/Pirate/piratelogo.png
    - type: OutlawBountyCartridge
