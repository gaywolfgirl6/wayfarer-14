- type: Interaction
  id: CheckOut
  action:
    !type:NoOpAction
  effectSuccess:
    popup: DefaultInteraction
    effectTarget: TargetThenUser
    soundPerceivedByOthers: false
    sound:
      path: /Audio/Floof/Lewd/blush.ogg
      params:
        volume: -8
        variation: 0.2
        maxDistance: 3
  delay: 0
  cooldown: 5
  range:
    min: 0
    max: 15.0  # Can check out from a distance
  requiresCanInteract: false
  requiresHands: false
  allowSelfInteract: false
  priority: 0
  categoryKey: interaction

- type: Interaction
