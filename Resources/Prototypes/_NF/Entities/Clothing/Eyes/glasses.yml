- type: entity
  id: ClothingEyesArcadiaVisor
  name: arcadia visor
  parent: [ ClothingEyesBase ] # Wayfarer: Remove contraband
  description: A visor produced by Arcadia Industries, with some high tech optics systems built in.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Eyes/Glasses/arcadia.rsi
  - type: Clothing
    sprite: _NF/Clothing/Eyes/Glasses/arcadia.rsi
  - type: FlashImmunity
  - type: EyeProtection
  - type: VisionCorrection
  - type: IdentityBlocker

- type: entity
  parent: ClothingEyesBase
  id: ClothingEyesGlassesPilot
  name: pilot goggles
  description: I'm sorry, but you can't pilot a ship without cool glasses. Those are the Rules. Has a GPS built in them too.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Eyes/Glasses/pilot.rsi
  - type: Clothing
    sprite: _NF/Clothing/Eyes/Glasses/pilot.rsi
  - type: HandheldGPS
  - type: VisionCorrection
  - type: HelmetAccessory # Wayfarer :>
    rsi:
      sprite: _WF/Clothing/Helmetaddons/Goggles/pilotgoggles.rsi
      state: helmet

- type: entity
  parent: [ClothingEyesGlassesSecurity, BaseCGPContraband] # Wayfarer: add BaseCGPContraband
  id: ClothingEyesGlassesNfsd
  name: CGP glasses
  description: Upgraded sunglasses that provide flash immunity and a security HUD.
  components:
  - type: Sprite
    sprite: _WF/Clothing/Eyes/Glasses/CGP_glasses.rsi # Wayfarer: _NF/Clothing/Eyes/Glasses/nfsd_glasses.rsi < _WF/Clothing/Eyes/Glasses/CGP_glasses.rsi
  - type: Clothing
    sprite: _WF/Clothing/Eyes/Glasses/CGP_glasses.rsi # Wayfarer: _NF/Clothing/Eyes/Glasses/nfsd_glasses.rsi < _WF/Clothing/Eyes/Glasses/CGP_glasses.rsi

- type: entity
  parent: [ClothingEyesGlassesMeson, BaseCommandContraband]
  id: ClothingEyesGlassesMesonPlantManager
  name: plant manager's goggles
  description: Green-tinted protective goggles with an integrated HUD for crew identification.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Eyes/Glasses/manager_meson.rsi
  - type: Clothing
    sprite: _NF/Clothing/Eyes/Glasses/manager_meson.rsi
  - type: EyeProtection
  - type: IdentityBlocker
    coverage: EYES
  - type: StaticPrice
    price: 250
  - type: VisionCorrection
  - type: ShowJobIcons
  - type: HelmetAccessory # Wayfarer :>
    rsi:
      sprite: _WF/Clothing/Helmetaddons/Goggles/engigoggles.rsi
      state: helmet
