- type: entity
  name: poker chip
  suffix: Full
  parent: BaseItem
  id: PokerChip
  abstract: true
  description: A poker chip, probably worth spesos. Gambling is fun!  # Removing Spesos Value - Wayfarer14
  components:
  - type: Tag
    tags:
    - PokerChip
  - type: Sprite
    sprite: _TheDen/Objects/Fun/poker_chips.rsi
    state: chip
  - type: Item
    size: Tiny
  - type: EmitSoundOnPickup
    sound: /Audio/_TheDen/Items/Poker_Chips/chips_handle_large.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/_TheDen/Items/Poker_Chips/chips_stack.ogg

