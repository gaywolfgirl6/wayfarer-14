- type: species
  id: Vox
  name: species-name-vox
  roundStart: true
  prototype: MobVox
  sprites: MobVoxSprites
  markingLimits: MobHumanMarkingLimits #MobVoxMarkingLimits WF
  dollPrototype: MobVoxDummy
  skinColoration: Hues # imp VoxFeathers<Hues
  defaultSkinTone: "#6c741d"
  maleFirstNames: NamesVox
  femaleFirstNames: NamesVox
  naming: First
  sexes:
  - Unsexed

  minAge: 18    # 500 years is the basis of when vox began to undo their genetic modifications.
  maxAge: 500   # Because vox are based on their mind and not body, this is a fairly new concept.
  youngAge: 200
  oldAge: 350

